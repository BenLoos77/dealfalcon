<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>DealFalcon — Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --marine-deep: #001A2A;
    --marine: #00253A;
    --marine-soft: #1a3a4f;
    --red: #F11A22;
    --red-deep: #C41419;
    --red-light: #FF3F46;
    --info-blue: #008AC9;
    --info-blue-light: #4DB1DC;
    --info-blue-deep: #006FA1;
    --violet: #4A2D8F;
    --violet-glow: #6B3FBF;
    --display: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'Geist Mono', 'SF Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{
    width:100%;height:100%;
    background:radial-gradient(ellipse at center, #00253A 0%, #001A2A 60%, #000810 100%);
    overflow:hidden;
    font-family: var(--display);
    color:#bae6fd;
  }
  .stage{position:fixed;inset:0;perspective:1400px;overflow:hidden}
  .stage::before{
    content:"";position:absolute;inset:0;
    background:repeating-linear-gradient(to bottom,
      rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px,
      transparent 1px, transparent 3px);
    pointer-events:none;z-index:50;mix-blend-mode:overlay;
  }
  .stage::after{
    content:"";position:absolute;inset:0;
    background:radial-gradient(ellipse at center, transparent 35%, rgba(0,5,15,0.85) 100%);
    pointer-events:none;z-index:49;
  }
  svg.network{position:absolute;inset:0;width:100%;height:100%}

  /* ============ FULL-WIDTH BOTTOM NEWS TICKER ============ */
  .ticker-bar{
    position:absolute;
    bottom:0; left:0; right:0;
    height:64px;
    z-index:55;
    display:flex;
    align-items:stretch;
    background: linear-gradient(180deg, rgba(0,26,42,0.92) 0%, rgba(0,12,24,0.98) 100%);
    border-top: 1px solid rgba(241,26,34,0.5);
    box-shadow: 0 -8px 40px rgba(0,0,0,0.5), 0 -1px 0 rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    transform: translateY(100%);
    transition: transform 0.7s cubic-bezier(.2,.7,.2,1);
  }
  .ticker-bar.visible{ transform: translateY(0); }
  .ticker-bar.exit{ transform: translateY(100%); transition: transform 0.6s ease-in; }

  .ticker-brand{
    display:flex;
    align-items:center;
    gap:14px;
    background: var(--red);
    padding: 0 28px;
    position:relative;
  }
  .ticker-brand::after{
    content:"";
    position:absolute;
    right:-20px; top:0; bottom:0;
    width:24px;
    background: var(--red);
    clip-path: polygon(0 0, 70% 0, 100% 50%, 70% 100%, 0 100%);
  }
  .ticker-brand-dot{
    width:9px; height:9px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 0 12px rgba(255,255,255,0.8);
    animation: tickerPulse 1.4s ease-in-out infinite;
  }
  @keyframes tickerPulse{
    0%,100%{opacity:1;transform:scale(1)}
    50%{opacity:0.5;transform:scale(0.8)}
  }
  .ticker-brand-text{
    font-family: var(--mono);
    font-size:14px;
    font-weight:700;
    color:#fff;
    letter-spacing:0.2em;
    text-transform:uppercase;
  }

  .ticker-content{
    flex:1;
    overflow:hidden;
    position:relative;
    display:flex;
    align-items:center;
    margin-left:32px;
    mask-image: linear-gradient(to right, transparent 0, #000 60px, #000 calc(100% - 60px), transparent 100%);
    -webkit-mask-image: linear-gradient(to right, transparent 0, #000 60px, #000 calc(100% - 60px), transparent 100%);
  }
  .ticker-track{
    display:flex;
    align-items:center;
    gap:0;
    white-space:nowrap;
    animation: tickerScroll 75s linear infinite;
    will-change: transform;
  }
  @keyframes tickerScroll{
    0%{ transform: translateX(0); }
    100%{ transform: translateX(-50%); }
  }
  .ticker-item{
    font-family: var(--display);
    font-size:22px;
    font-weight:500;
    color:#fff;
    letter-spacing:-0.01em;
    padding: 0 36px;
    display:inline-flex;
    align-items:center;
    gap:18px;
  }
  .ticker-item::before{
    content:"◆";
    color: var(--red);
    font-size:11px;
    opacity:0.8;
  }
  .ticker-item.highlight{
    color: var(--red-light);
    font-weight:600;
  }
  .ticker-item.highlight::before{ color: #fff; }

  .ticker-time{
    display:flex;
    align-items:center;
    padding: 0 28px;
    border-left: 1px solid rgba(77,177,220,0.3);
    font-family: var(--mono);
    font-size:13px;
    font-weight:500;
    color: rgba(186,230,253,0.7);
    letter-spacing:0.1em;
    flex-shrink:0;
  }

  /* ============ HERO TEXT REVEAL ============ */
  .hero-reveal{
    position:absolute;
    inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    z-index:45;
    opacity:0;
    pointer-events:none;
    padding:0 40px;
    text-align:center;
  }
  .hero-reveal.show{
    animation: heroIn 0.8s cubic-bezier(.2,.7,.2,1) forwards;
  }
  .hero-reveal.hide{
    animation: heroOut 0.6s ease-in forwards;
  }
  @keyframes heroIn{
    0%{opacity:0; transform:translateY(20px)}
    100%{opacity:1; transform:translateY(0)}
  }
  @keyframes heroOut{
    0%{opacity:1; transform:scale(1)}
    100%{opacity:0; transform:scale(0.95)}
  }
  .hero-eyebrow-pill{
    display:inline-flex; align-items:center; gap:10px;
    background: rgba(241, 26, 34, 0.10);
    border: 1px solid rgba(241, 26, 34, 0.35);
    color:#fff;
    padding:8px 18px;
    border-radius:100px;
    font-family: var(--mono);
    font-size:11px;
    font-weight:500;
    letter-spacing:0.15em;
    text-transform:uppercase;
    margin-bottom:28px;
  }
  .hero-eyebrow-pill .dot{
    width:7px; height:7px; border-radius:50%;
    background: var(--red);
    box-shadow: 0 0 10px var(--red);
    animation: tickerPulse 2s ease-in-out infinite;
  }
  .hero-headline{
    font-family: var(--display);
    font-size: clamp(40px, 5.5vw, 88px);
    font-weight: 700;
    line-height: 1.02;
    letter-spacing: -0.045em;
    color:#fff;
    max-width: 1100px;
  }
  .hero-headline .red-word{
    color: var(--red);
    position: relative;
    display:inline-block;
  }
  .hero-headline .red-word::after{
    content:"";
    position:absolute;
    inset: -12px -28px;
    background: radial-gradient(ellipse, rgba(241,26,34,0.35), transparent 70%);
    z-index:-1;
  }
  .hero-headline .line{ display:block; }
  .hero-sub{
    margin-top:32px;
    font-size: clamp(15px, 1.3vw, 19px);
    color: rgba(186, 230, 253, 0.75);
    max-width: 720px;
    line-height: 1.5;
    font-weight: 400;
  }

  /* ============ LOGO FINAL ============ */
  .logo-wrap{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    opacity:0;z-index:40;pointer-events:none;gap:24px;
  }
  .logo-wrap.show{
    animation: logoIn 1.5s cubic-bezier(.2,.7,.2,1) forwards;
  }
  @keyframes logoIn{
    0%{opacity:0;transform:scale(0.92)}
    40%{opacity:1}
    100%{opacity:1;transform:scale(1)}
  }
  .logo-mark{
    width:130px;height:130px;
    filter: drop-shadow(0 0 30px rgba(241,26,34,0.4)) drop-shadow(0 0 80px rgba(0,138,201,0.25));
  }
  .logo-text{
    font-family: var(--mono);
    font-size:clamp(44px, 7vw, 96px);
    font-weight:600;letter-spacing:-0.02em;
    color:#fff;
    text-shadow:0 0 25px rgba(241,26,34,0.4),0 0 70px rgba(0,138,201,0.25);
  }
  .logo-text .accent{ color: var(--red); }
  .tagline{
    margin-top:8px;
    font-family: var(--mono);
    font-size:clamp(12px,1.1vw,16px);
    letter-spacing:0.4em;
    color:rgba(186,230,253,0.7);
    text-transform:uppercase;
    font-weight:400;
  }

  .scene-logo{
    position:absolute;
    left:50px; top:540px;
    z-index:30;
    display:flex; align-items:center; gap:12px;
    opacity:0;
    transition: opacity 1s ease-out;
  }
  .scene-logo.visible{ opacity:1; }
  .scene-logo svg{
    width:36px; height:36px;
    filter: drop-shadow(0 0 8px rgba(241,26,34,0.3));
  }
  .scene-logo .name{
    font-family: var(--mono);
    font-size:18px;
    font-weight:600;
    color:#fff;
    letter-spacing:-0.5px;
  }

  .pulse-bg{
    position:absolute;inset:0;
    background:radial-gradient(circle at 50% 50%, rgba(0,138,201,0.07) 0%, transparent 65%);
    z-index:1;animation: pulse 7s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:0.9}}

  .restart{
    position:fixed;bottom:80px;right:24px;z-index:100;
    background:rgba(241,26,34,0.1);border:1px solid rgba(241,26,34,0.45);
    color:#FF3F46;padding:10px 18px;border-radius:100px;
    font-family: var(--mono);
    font-size:12px;letter-spacing:0.15em;cursor:pointer;
    text-transform:uppercase;backdrop-filter:blur(8px);transition:all 0.3s;
    opacity:0;animation:fadeBtn 1s 24s forwards;
  }
  .restart:hover{background:rgba(241,26,34,0.2);color:#fff}
  @keyframes fadeBtn{to{opacity:1}}
</style>
</head>
<body>
<div class="stage">
  <div class="pulse-bg"></div>

  <svg class="network" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
    <defs>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="6" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>

      <radialGradient id="senderGrad" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
        <stop offset="40%" stop-color="#4DB1DC" stop-opacity="0.85"/>
        <stop offset="100%" stop-color="#008AC9" stop-opacity="0"/>
      </radialGradient>

      <radialGradient id="orbGlass" cx="35%" cy="30%" r="65%">
        <stop offset="0%" stop-color="rgba(186,230,253,0.4)"/>
        <stop offset="20%" stop-color="rgba(77,177,220,0.18)"/>
        <stop offset="55%" stop-color="rgba(0,138,201,0.1)"/>
        <stop offset="90%" stop-color="rgba(0,111,161,0.25)"/>
        <stop offset="100%" stop-color="rgba(77,177,220,0.55)"/>
      </radialGradient>
      <radialGradient id="orbHighlight" cx="30%" cy="25%" r="35%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
        <stop offset="60%" stop-color="rgba(255,255,255,0.1)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <radialGradient id="orbRefraction" cx="65%" cy="75%" r="40%">
        <stop offset="0%" stop-color="rgba(241,26,34,0.12)"/>
        <stop offset="100%" stop-color="rgba(241,26,34,0)"/>
      </radialGradient>

      <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="rgba(0,138,201,0)"/>
        <stop offset="50%" stop-color="rgba(77,177,220,0.75)"/>
        <stop offset="100%" stop-color="rgba(0,138,201,0)"/>
      </linearGradient>
      <linearGradient id="lineGradReverse" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="rgba(241,26,34,0.85)"/>
        <stop offset="50%" stop-color="rgba(255,63,70,0.5)"/>
        <stop offset="100%" stop-color="rgba(241,26,34,0)"/>
      </linearGradient>

      <symbol id="falcon" viewBox="-50 -30 100 60">
        <path d="M 0,-4 L -8,-10 L -28,-22 L -18,-8 L -45,-2 L -22,2 L -38,14 L -16,6 L -10,18 L -4,8 L 0,12 L 4,8 L 10,18 L 16,6 L 38,14 L 22,2 L 45,-2 L 18,-8 L 28,-22 L 8,-10 Z"
              fill="#F11A22" stroke="#FF3F46" stroke-width="0.8" stroke-linejoin="round" filter="url(#redGlow)"/>
        <circle cx="0" cy="-2" r="2" fill="#001A2A"/>
      </symbol>

      <symbol id="offerDoc" viewBox="-14 -18 28 36">
        <rect x="-10" y="-14" width="20" height="28" rx="1.5" fill="#001A2A" stroke="#4DB1DC" stroke-width="1"/>
        <line x1="-6" y1="-8" x2="6" y2="-8" stroke="#4DB1DC" stroke-width="0.8"/>
        <line x1="-6" y1="-4" x2="6" y2="-4" stroke="#4DB1DC" stroke-width="0.8"/>
        <line x1="-6" y1="0" x2="4" y2="0" stroke="#4DB1DC" stroke-width="0.8"/>
        <text x="0" y="10" text-anchor="middle" fill="#F11A22" font-size="6" font-family="Geist Mono, monospace" font-weight="bold">€</text>
      </symbol>
    </defs>

    <g id="network" opacity="0">
      <g id="netLines" stroke="rgba(0,138,201,0.2)" stroke-width="1" fill="none"></g>
      <g id="netNodes"></g>
    </g>

    <g id="sender" opacity="0">
      <circle cx="180" cy="450" r="38" fill="url(#senderGrad)" filter="url(#strongGlow)"/>
      <circle cx="180" cy="450" r="18" fill="#008AC9" filter="url(#glow)"/>
      <circle cx="180" cy="450" r="7" fill="#fff"/>
      <circle cx="180" cy="450" r="38" fill="none" stroke="#4DB1DC" stroke-width="1.5" opacity="0.5">
        <animate attributeName="r" values="38;85;38" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0;0.5" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <text x="180" y="515" text-anchor="middle" fill="#4DB1DC" font-size="13" letter-spacing="4" opacity="0.7" font-family="Geist Mono, monospace">SENDER</text>
    </g>

    <g id="recipients"></g>
    <g id="mails"></g>
    <g id="dialogs"></g>
    <g id="orbs"></g>
    <g id="returnInfo"></g>

    <g id="falconGroup" opacity="0">
      <use href="#falcon" id="falcon" x="800" y="100" width="120" height="72"/>
    </g>

    <g id="senderPanel" opacity="0"></g>
  </svg>

  <div class="scene-logo" id="sceneLogo">
    <svg viewBox="0 0 90 90">
      <circle cx="45" cy="45" r="40" fill="#001A2A" stroke="#fff" stroke-width="2.5"/>
      <path d="M36 24h24v3h-24zM33 27h33v3h-33zM30 30h39v3h-39zM27 33h15v3h-15zM60 33h12v3h-12zM27 36h21v3h-21zM66 36h9v3h-9zM24 39h27v3h-27zM60 39h18v3h-18zM21 42h57v3h-57zM21 45h57v3h-57zM21 48h30v3h-30zM72 48h6v3h-6zM18 51h24v3h-24zM75 51h3v3h-3zM15 54h24v3h-24zM15 57h18v3h-18zM12 60h15v3h-15zM12 63h9v3h-9z" fill="#fff"/>
      <rect x="75" y="51" width="3" height="3" fill="#F11A22"/>
    </svg>
    <span class="name">dealfalcon</span>
  </div>

  <!-- HERO TEXT REVEAL -->
  <div class="hero-reveal" id="heroReveal">
    <div class="hero-eyebrow-pill">
      <span class="dot"></span>
      Ihr digitaler Verkaufsraum
    </div>
    <h1 class="hero-headline">
      <span class="line"><span class="red-word">50&nbsp;%</span> mehr Abschlüsse</span>
      <span class="line">durch Transparenz</span>
      <span class="line">in der Entscheidungsphase.</span>
    </h1>
    <p class="hero-sub">
      Statt Funkstille nach dem Angebot sehen Sie live, was beim Kunden passiert.
    </p>
  </div>

  <!-- FINAL LOGO -->
  <div class="logo-wrap" id="logo">
    <svg class="logo-mark" viewBox="0 0 90 90">
      <circle cx="45" cy="45" r="40" fill="#001A2A" stroke="#fff" stroke-width="2.5"/>
      <path d="M36 24h24v3h-24zM33 27h33v3h-33zM30 30h39v3h-39zM27 33h15v3h-15zM60 33h12v3h-12zM27 36h21v3h-21zM66 36h9v3h-9zM24 39h27v3h-27zM60 39h18v3h-18zM21 42h57v3h-57zM21 45h57v3h-57zM21 48h30v3h-30zM72 48h6v3h-6zM18 51h24v3h-24zM75 51h3v3h-3zM15 54h24v3h-24zM15 57h18v3h-18zM12 60h15v3h-15zM12 63h9v3h-9z" fill="#fff"/>
      <rect x="75" y="51" width="3" height="3" fill="#F11A22"/>
    </svg>
    <div>
      <div class="logo-text">deal<span class="accent">falcon</span></div>
      <div class="tagline" style="text-align:center;">Transparency in customer reaction</div>
    </div>
  </div>

  <!-- FULL-WIDTH NEWS TICKER (bottom) -->
  <div class="ticker-bar" id="tickerBar">
    <div class="ticker-brand">
      <span class="ticker-brand-dot"></span>
      <span class="ticker-brand-text">Live</span>
    </div>
    <div class="ticker-content">
      <div class="ticker-track" id="tickerTrack">
        <!-- Items injected by JS, doubled for seamless loop -->
      </div>
    </div>
    <div class="ticker-time" id="tickerTime">DEALFALCON · LIVE FEED</div>
  </div>
</div>

<button class="restart" onclick="location.reload()">▶ Replay</button>

<script>
const svg = document.querySelector('svg.network');
const SVG_NS = 'http://www.w3.org/2000/svg';
const SENDER = {x: 180, y: 450};

const recipients = [
  { x: 1150, y: 220, id:'r1' },
  { x: 1320, y: 380, id:'r2' },
  { x: 1180, y: 580, id:'r3' },
  { x: 1380, y: 700, id:'r4' },
  { x: 1050, y: 400, id:'r5' },
];

const offerLabels = ["ANGEBOT #A-2401", "ANGEBOT #A-2402", "ANGEBOT #A-2403", "ANGEBOT #A-2404", "ANGEBOT #A-2405"];

const dialogTexts = [
  ["zu teuer", "verhandeln?", "→ feedback?"],
  ["interessant!", "muss Chef fragen", "Mittwoch Termin"],
  ["später lesen", "Q3 vielleicht", "Budget knapp"],
  ["GENAU das!", "sofort zusagen", "→ Antwort heute"],
  ["passt nicht", "anderer Anbieter", "höflich absagen"]
];

const insights = [
  {label:"EMPFÄNGER 1", status:"PREIS-EINWAND", color:"#FF3F46"},
  {label:"EMPFÄNGER 2", status:"ENTSCHEIDER FEHLT", color:"#4DB1DC"},
  {label:"EMPFÄNGER 3", status:"BUDGET Q3", color:"#6B3FBF"},
  {label:"EMPFÄNGER 4", status:"HOT LEAD ★", color:"#F11A22"},
  {label:"EMPFÄNGER 5", status:"VERLOREN", color:"#4a5a6a"},
];

// ============ NEWS TICKER ============
// Continuous scrolling ticker like ntv/BBC
const tickerItems = [
  { text: 'Angebote werden versendet' },
  { text: 'Hat der Kunde das Angebot erhalten?' },
  { text: 'Hat er es geöffnet?' },
  { text: 'Interessiert es ihn?' },
  { text: 'Sind wir zu teuer?' },
  { text: 'Wie groß sind meine Chancen?', highlight:true },
  { text: 'Wann meldet er sich wohl?' },
];

const tickerTrack = document.getElementById('tickerTrack');
// Build items twice for seamless infinite loop (CSS keyframe animation translates by -50%)
function buildTickerItems(){
  const html = tickerItems.map(it =>
    `<span class="ticker-item${it.highlight ? ' highlight' : ''}">${it.text}</span>`
  ).join('');
  // Render twice so end of first set lines up with start of second; loop appears continuous
  tickerTrack.innerHTML = html + html;
}
buildTickerItems();

// Show ticker bar (slide up from bottom) at 1.5s
setTimeout(()=>{
  document.getElementById('tickerBar').classList.add('visible');
}, 1500);

// Hide ticker before hero reveal
setTimeout(()=>{
  document.getElementById('tickerBar').classList.add('exit');
}, 17500);

// ============ NETWORK ============
const netNodes = document.getElementById('netNodes');
const netLines = document.getElementById('netLines');
const networkPoints = [];

for (let i = 0; i < 70; i++) {
  const x = 80 + Math.random() * 1440;
  // Avoid placing nodes in the very bottom (where the ticker is)
  const y = 40 + Math.random() * 740;
  networkPoints.push({x, y});
  const node = document.createElementNS(SVG_NS,'circle');
  node.setAttribute('cx', x);
  node.setAttribute('cy', y);
  node.setAttribute('r', 1.2 + Math.random()*1.3);
  node.setAttribute('fill', '#008AC9');
  node.setAttribute('opacity', 0.25 + Math.random()*0.4);
  node.setAttribute('filter','url(#glow)');
  const anim = document.createElementNS(SVG_NS, 'animate');
  anim.setAttribute('attributeName','opacity');
  anim.setAttribute('values', `${0.15+Math.random()*0.3};${0.5+Math.random()*0.3};${0.15+Math.random()*0.3}`);
  anim.setAttribute('dur', `${2.5+Math.random()*3}s`);
  anim.setAttribute('repeatCount','indefinite');
  node.appendChild(anim);
  netNodes.appendChild(node);
}

for (let i = 0; i < networkPoints.length; i++) {
  for (let j = i+1; j < networkPoints.length; j++) {
    const a = networkPoints[i], b = networkPoints[j];
    const dist = Math.hypot(a.x-b.x, a.y-b.y);

      const line = document.createElementNS(SVG_NS, 'line');
      line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);

const mailsGroup = document.getElementById('mails');

function sendOffer(targetIdx, delay) {
  const target = recipients[targetIdx];
  setTimeout(()=>{
    const offerG = document.createElementNS(SVG_NS, 'g');
    offerG.setAttribute('opacity','0');
    mailsGroup.appendChild(offerG);

    const halo = document.createElementNS(SVG_NS,'circle');
    halo.setAttribute('r', 12);
    halo.setAttribute('fill','#4DB1DC');
    halo.setAttribute('opacity','0.4');
    halo.setAttribute('filter','url(#strongGlow)');
    offerG.appendChild(halo);

    const doc = document.createElementNS(SVG_NS,'use');
    doc.setAttribute('href','#offerDoc');
    doc.setAttribute('x','-12'); doc.setAttribute('y','-16');
    doc.setAttribute('width','24'); doc.setAttribute('height','32');
    offerG.appendChild(doc);

    const lbl = document.createElementNS(SVG_NS,'text');
    lbl.setAttribute('y','24');
    lbl.setAttribute('text-anchor','middle');
    lbl.setAttribute('fill','#4DB1DC');
    lbl.setAttribute('font-size','8');
    lbl.setAttribute('font-family','Geist Mono, monospace');
    lbl.setAttribute('letter-spacing','1');
    lbl.setAttribute('font-weight','600');
    lbl.textContent = offerLabels[targetIdx];
    offerG.appendChild(lbl);

    const trail = document.createElementNS(SVG_NS, 'path');
    const cx = (SENDER.x + target.x)/2;
    const cy = Math.min(SENDER.y, target.y) - 80 - Math.random()*60;
    const d = `M ${SENDER.x} ${SENDER.y} Q ${cx} ${cy} ${target.x} ${target.y}`;
    trail.setAttribute('d', d);
    trail.setAttribute('stroke','url(#lineGrad)');
    trail.setAttribute('stroke-width','1.5');
    trail.setAttribute('fill','none');
    trail.setAttribute('opacity','0');
    mailsGroup.appendChild(trail);

    trail.animate([{opacity:0},{opacity:0.8,offset:0.3},{opacity:0.8,offset:0.7},{opacity:0}],
      {duration:1800, fill:'forwards'});

    offerG.animate([{opacity:0},{opacity:1}],{duration:200, fill:'forwards'});

    const start = performance.now();
    const dur = 1700;
    function step(t){
      const p = Math.min(1, (t-start)/dur);
      const px = (1-p)*(1-p)*SENDER.x + 2*(1-p)*p*cx + p*p*target.x;
      const py = (1-p)*(1-p)*SENDER.y + 2*(1-p)*p*cy + p*p*target.y;
      offerG.setAttribute('transform', `translate(${px},${py})`);
      if (p < 1) requestAnimationFrame(step);
      else {
        const flash = document.createElementNS(SVG_NS,'circle');
        flash.setAttribute('cx', target.x); flash.setAttribute('cy', target.y);
        flash.setAttribute('r', 6);
        flash.setAttribute('fill','none');
        flash.setAttribute('stroke','#4DB1DC');
        flash.setAttribute('stroke-width','2');
        flash.setAttribute('filter','url(#glow)');
        mailsGroup.appendChild(flash);
        flash.animate([{r:6, opacity:1, 'stroke-width':2},{r:60, opacity:0, 'stroke-width':0.5}],
          {duration:900, fill:'forwards'});
        setTimeout(()=>flash.remove(),900);
        offerG.animate([{opacity:1},{opacity:0}],{duration:300, fill:'forwards'});
        setTimeout(()=>offerG.remove(),300);
        setTimeout(()=>trail.remove(),500);
      }
    }
    requestAnimationFrame(step);
  }, delay);
}

// ============ DIALOGS ============
const dialogsGroup = document.getElementById('dialogs');

function createDialogs(r, idx, texts) {
  const g = document.createElementNS(SVG_NS, 'g');
  g.setAttribute('id',`dialog-${idx}`);
  g.setAttribute('opacity','0');

  texts.forEach((txt, i)=>{
    const isLeft = i%2===0;
    const bubbleX = r.x + (isLeft ? -22 : 22);
    const bubbleY = r.y - 65 + i*26;
    const bw = txt.length * 5.8 + 14;

    const bubble = document.createElementNS(SVG_NS,'g');

    const rect = document.createElementNS(SVG_NS,'rect');
    rect.setAttribute('x', bubbleX - bw/2);
    rect.setAttribute('y', bubbleY - 9);
    rect.setAttribute('width', bw);
    rect.setAttribute('height', 18);
    rect.setAttribute('rx', 9);
    rect.setAttribute('fill', isLeft ? 'rgba(0,111,161,0.55)' : 'rgba(0,37,58,0.85)');
    rect.setAttribute('stroke','rgba(77,177,220,0.6)');
    rect.setAttribute('stroke-width','0.7');
    bubble.appendChild(rect);

    const tail = document.createElementNS(SVG_NS,'path');
    const tx = isLeft ? bubbleX - bw/2 + 4 : bubbleX + bw/2 - 4;
    tail.setAttribute('d', `M ${tx} ${bubbleY+9} l ${isLeft?-3:3} 4 l ${isLeft?6:-6} -4 z`);
    tail.setAttribute('fill', isLeft ? 'rgba(0,111,161,0.55)' : 'rgba(0,37,58,0.85)');
    bubble.appendChild(tail);

    const text = document.createElementNS(SVG_NS,'text');
    text.setAttribute('x', bubbleX);
    text.setAttribute('y', bubbleY + 3.5);
    text.setAttribute('text-anchor','middle');
    text.setAttribute('fill','#bae6fd');
    text.setAttribute('font-size','10');
    text.setAttribute('font-family','Geist Mono, monospace');
    text.textContent = txt;
    bubble.appendChild(text);

    g.appendChild(bubble);
  });

  dialogsGroup.appendChild(g);
  return g;
}

// ============ GLASS ORB ============
const orbsGroup = document.getElementById('orbs');

function createOrb(r, idx) {

  const g = document.createElementNS(SVG_NS, 'g');
  g.setAttribute('id', `orb-${idx}`);
  g.setAttribute('opacity','0');
  g.setAttribute('transform-origin', `${cx}px ${cy}px`);

  const glow = document.createElementNS(SVG_NS,'circle');
  glow.setAttribute('cx', cx); glow.setAttribute('cy', cy);
  glow.setAttribute('r', radius + 8);
  glow.setAttribute('fill','rgba(77,177,220,0.06)');
  glow.setAttribute('filter','url(#strongGlow)');
  g.appendChild(glow);

  const sphere = document.createElementNS(SVG_NS,'circle');
  sphere.setAttribute('cx', cx); sphere.setAttribute('cy', cy);
  sphere.setAttribute('r', radius);
  sphere.setAttribute('fill','url(#orbGlass)');
  sphere.setAttribute('stroke','rgba(77,177,220,0.5)');
  sphere.setAttribute('stroke-width','1');
  g.appendChild(sphere);

  const refract = document.createElementNS(SVG_NS,'circle');
  refract.setAttribute('cx', cx); refract.setAttribute('cy', cy);
  refract.setAttribute('r', radius);
  refract.setAttribute('fill','url(#orbRefraction)');
  g.appendChild(refract);

  const hl = document.createElementNS(SVG_NS,'ellipse');
  hl.setAttribute('cx', cx - radius*0.35);
  hl.setAttribute('cy', cy - radius*0.4);
  hl.setAttribute('rx', radius*0.32);
  hl.setAttribute('ry', radius*0.22);
  hl.setAttribute('fill','url(#orbHighlight)');
  hl.setAttribute('transform', `rotate(-30 ${cx - radius*0.35} ${cy - radius*0.4})`);
  g.appendChild(hl);

  const hl2 = document.createElementNS(SVG_NS,'path');
  hl2.setAttribute('d', `M ${cx + radius*0.45} ${cy + radius*0.15} Q ${cx + radius*0.55} ${cy + radius*0.4}, ${cx + radius*0.35} ${cy + radius*0.55}`);
  hl2.setAttribute('stroke','rgba(255,255,255,0.4)');
  hl2.setAttribute('stroke-width','1.5');
  hl2.setAttribute('fill','none');
  hl2.setAttribute('stroke-linecap','round');
  g.appendChild(hl2);

  const rim = document.createElementNS(SVG_NS,'circle');
  rim.setAttribute('cx', cx); rim.setAttribute('cy', cy);
  rim.setAttribute('r', radius - 1);
  rim.setAttribute('fill','none');
  rim.setAttribute('stroke','rgba(186,230,253,0.25)');
  rim.setAttribute('stroke-width','0.5');
  g.appendChild(rim);

  orbsGroup.appendChild(g);
  return g;
}

// ============ FALCON + DISSOLVE + INFO RETURN ============
const falconGroup = document.getElementById('falconGroup');
const falcon = document.getElementById('falcon');
const returnInfoGroup = document.getElementById('returnInfo');

function sendInfoBack(r, idx) {
  const start = {x: r.x, y: r.y - 30};
  const end = {x: SENDER.x, y: SENDER.y};

  const packetG = document.createElementNS(SVG_NS,'g');
  returnInfoGroup.appendChild(packetG);

  const packet = document.createElementNS(SVG_NS,'circle');
  packet.setAttribute('r', 5);
  packet.setAttribute('fill', insights[idx].color);
  packet.setAttribute('filter','url(#strongGlow)');
  packetG.appendChild(packet);

  const dataLabel = document.createElementNS(SVG_NS,'text');
  dataLabel.setAttribute('fill', insights[idx].color);
  dataLabel.setAttribute('font-size','8');
  dataLabel.setAttribute('font-family','Geist Mono, monospace');
  dataLabel.setAttribute('font-weight','600');
  dataLabel.setAttribute('text-anchor','middle');
  dataLabel.setAttribute('opacity','0.95');
  dataLabel.setAttribute('y','-10');
  dataLabel.textContent = insights[idx].status;
  packetG.appendChild(dataLabel);

  const cx = (start.x + end.x)/2;
  const cy = Math.min(start.y, end.y) - 100 - Math.random()*50;
  const trail = document.createElementNS(SVG_NS,'path');
  trail.setAttribute('d', `M ${start.x} ${start.y} Q ${cx} ${cy} ${end.x} ${end.y}`);
  trail.setAttribute('stroke','url(#lineGradReverse)');
  trail.setAttribute('stroke-width','1.3');
  trail.setAttribute('fill','none');
  trail.setAttribute('opacity','0');
  returnInfoGroup.appendChild(trail);
  trail.animate([{opacity:0},{opacity:0.8,offset:0.3},{opacity:0.8,offset:0.7},{opacity:0}],
    {duration:1800, fill:'forwards'});

  packetG.setAttribute('transform', `translate(${start.x}, ${start.y})`);
  const startT = performance.now();
  const dur = 1500;
  function step(t){
    const p = Math.min(1, (t-startT)/dur);
    const px = (1-p)*(1-p)*start.x + 2*(1-p)*p*cx + p*p*end.x;
    const py = (1-p)*(1-p)*start.y + 2*(1-p)*p*cy + p*p*end.y;
    packetG.setAttribute('transform', `translate(${px}, ${py})`);
    if (p < 1) requestAnimationFrame(step);
    else {
      const flash = document.createElementNS(SVG_NS,'circle');
      flash.setAttribute('cx', SENDER.x); flash.setAttribute('cy', SENDER.y);
      flash.setAttribute('r', 8);
      flash.setAttribute('fill','none');
      flash.setAttribute('stroke', insights[idx].color);
      flash.setAttribute('stroke-width','2');
      flash.setAttribute('filter','url(#glow)');
      returnInfoGroup.appendChild(flash);
      flash.animate([{r:8, opacity:1},{r:60, opacity:0}],{duration:700, fill:'forwards'});
      setTimeout(()=>flash.remove(),700);
      packetG.remove();
      setTimeout(()=>trail.remove(),400);
    }
  }
  requestAnimationFrame(step);
}

function dissolveOrb(idx, r) {
  const orb = document.getElementById(`orb-${idx}`);
  if (!orb || orb.dataset.dissolved) return;
  orb.dataset.dissolved = '1';

  for (let s=0; s<14; s++){
    const shard = document.createElementNS(SVG_NS,'circle');
    shard.setAttribute('cx', r.x);
    shard.setAttribute('cy', r.y - 30);
    shard.setAttribute('r', 1 + Math.random()*1.5);
    shard.setAttribute('fill','rgba(186,230,253,0.95)');
    shard.setAttribute('filter','url(#glow)');
    orbsGroup.appendChild(shard);
    const ang = Math.random()*Math.PI*2;
    const spd = 50 + Math.random()*90;
    shard.animate([
      {cx:r.x, cy:r.y-30, opacity:1},
      {cx:r.x+Math.cos(ang)*spd, cy:r.y-30+Math.sin(ang)*spd, opacity:0}
    ],{duration:1000, fill:'forwards'});
    setTimeout(()=>shard.remove(),1000);
  }

  orb.animate([
    {opacity:1, transform:'scale(1)', filter:'blur(0px)'},
    {opacity:0.5, transform:'scale(1.15)', filter:'blur(3px)', offset:0.4},
    {opacity:0, transform:'scale(1.3)', filter:'blur(8px)'}
  ],{duration:800, fill:'forwards'});

  const dialog = document.getElementById(`dialog-${idx}`);
  if (dialog) {
    dialog.animate([
      {filter:'brightness(1)'},
      {filter:'brightness(1.8)'},
      {filter:'brightness(1.2)'}
    ],{duration:900});
  }

  setTimeout(()=>sendInfoBack(r, idx), 500);
}

setTimeout(()=>{
  falconGroup.animate([{opacity:0},{opacity:1}],{duration:600, fill:'forwards'});

  const centerX = 1220, centerY = 460;
  const radiusX = 280, radiusY = 230;
  const startT = performance.now();
  const duration = 7500;

  function flyFalcon(t){
    const elapsed = t - startT;
    const p = elapsed / duration;
    if (p > 1) {
      falconGroup.animate([{opacity:1},{opacity:0}],{duration:800, fill:'forwards'});
      return;
    }
    const angle = -Math.PI*0.6 + p * Math.PI * 2.2;
    const x = centerX + Math.cos(angle) * radiusX - 60;
    const y = centerY + Math.sin(angle) * radiusY - 36;
    const tangent = angle + Math.PI/2;
    const rotDeg = tangent * 180 / Math.PI;
    const bank = Math.sin(p * Math.PI * 4) * 5;
    falcon.setAttribute('x', x); falcon.setAttribute('y', y);
    falcon.setAttribute('transform', `rotate(${rotDeg + bank}, ${x+60}, ${y+36})`);

    recipients.forEach((r, i)=>{
      const orb = document.getElementById(`orb-${i}`);
      if (!orb || orb.dataset.dissolved) return;
      const dx = (x+60) - r.x;
      const dy = (y+36) - (r.y - 30);
      const dist = Math.hypot(dx, dy);
      if (dist < 95 && p > 0.12) {
        dissolveOrb(i, r);
      }
    });
    requestAnimationFrame(flyFalcon);
  }
  requestAnimationFrame(flyFalcon);
}, 10500);
