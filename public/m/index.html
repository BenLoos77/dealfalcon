<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ihr persönliches Angebot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --gold: #f5a524; --gold-deep: #c97a14;
    --ink: #0a0a0a; --ink-strong: #1d1d1f; --ink-mid: #424245; --ink-mute: #6e6e73; --ink-faint: #86868b;
    --paper: #ffffff; --paper-warm: #fbfbfb; --paper-cool: #f5f5f7;
    --line: #d2d2d7; --line-soft: #e8e8ed;
    --green: #16a34a; --green-soft: #dcfce7;
    --red: #dc2626; --red-soft: #fee2e2;
    --display: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'Geist Mono', 'SF Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--display); color: var(--ink-strong); background: #f5f5f7; line-height: 1.5; -webkit-font-smoothing: antialiased; min-height: 100vh; }

  /* Microsite Container */
  .ms-shell { padding: 28px 0 60px; min-height: 100vh; }
  .ms-container { max-width: 880px; margin: 0 auto; padding: 0 24px; }

  /* Top-Bar */
  .ms-topbar { display: flex; align-items: center; justify-content: space-between; gap: 16px; background: white; padding: 16px 24px; border-radius: 12px; border: 1px solid var(--line-soft); margin-bottom: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
  .ms-brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .ms-brand-logo { width: 38px; height: 38px; border-radius: 9px; background: var(--ink); color: white; display: flex; align-items: center; justify-content: center; font-family: var(--display); font-size: 14px; font-weight: 700; letter-spacing: -0.02em; flex-shrink: 0; }
  .ms-brand-text { min-width: 0; }
  .ms-brand-text strong { display: block; font-family: var(--display); font-size: 14px; color: var(--ink); font-weight: 700; letter-spacing: -0.005em; }
  .ms-brand-text small { display: block; font-family: var(--mono); font-size: 10px; color: var(--ink-mute); letter-spacing: 0.04em; text-transform: uppercase; margin-top: 2px; }
  .ms-version-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--paper-cool); border: 1px solid var(--line-soft); padding: 6px 12px; border-radius: 100px; font-family: var(--mono); font-size: 11px; color: var(--ink-mid); letter-spacing: 0.04em; flex-shrink: 0; font-weight: 600; }
  .ms-version-pill strong { color: var(--ink); font-weight: 700; }

  /* Hero */
  .ms-hero { background: white; padding: 44px 36px 36px; border-radius: 14px; border: 1px solid var(--line-soft); margin-bottom: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
  .ms-hero-greeting { font-family: var(--mono); font-size: 11px; color: var(--gold-deep); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600; margin-bottom: 14px; }
  .ms-hero h1 { font-family: var(--display); font-size: 32px; line-height: 1.15; letter-spacing: -0.025em; color: var(--ink); font-weight: 700; margin: 0 0 18px; }
  .ms-hero h1 .gold { color: var(--gold-deep); }
  .ms-hero-letter { font-family: var(--display); font-size: 15px; color: var(--ink-mid); line-height: 1.65; max-width: 620px; margin-bottom: 24px; white-space: pre-line; }
  .ms-hero-signature { display: flex; align-items: center; gap: 14px; padding-top: 20px; border-top: 1px solid var(--line-soft); }
  .ms-sig-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--gold-deep)); color: var(--black); display: flex; align-items: center; justify-content: center; font-family: var(--display); font-weight: 800; font-size: 14px; flex-shrink: 0; letter-spacing: -0.01em; }
  .ms-sig-info { min-width: 0; }
  .ms-sig-info strong { display: block; font-family: var(--display); font-size: 14px; color: var(--ink); font-weight: 700; }
  .ms-sig-info small { display: block; font-family: var(--mono); font-size: 10px; color: var(--ink-mute); letter-spacing: 0.04em; margin-top: 2px; }

  /* Cards */
  .ms-card { background: white; border-radius: 14px; border: 1px solid var(--line-soft); margin-bottom: 16px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
  .ms-card-header { padding: 18px 24px; display: flex; align-items: baseline; justify-content: space-between; gap: 12px; border-bottom: 1px solid var(--line-soft); }
  .ms-card-header h3 { margin: 0; font-family: var(--display); font-size: 16px; color: var(--ink); font-weight: 700; letter-spacing: -0.015em; }
  .ms-card-header small { font-family: var(--mono); font-size: 11px; color: var(--ink-mute); letter-spacing: 0.04em; }
  .ms-card-body { padding: 22px 24px; }

  .ms-facts-grid { display: grid; grid-template-columns: 1fr 1fr; }
  @media (max-width: 600px) { .ms-facts-grid { grid-template-columns: 1fr; } }
  .ms-fact { padding: 18px 24px; border-right: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft); }
  .ms-fact:nth-child(2n) { border-right: none; }
  .ms-fact:nth-last-child(-n+2) { border-bottom: none; }
  @media (max-width: 600px) {
    .ms-fact { border-right: none !important; }
    .ms-fact:last-child { border-bottom: none; }
  }
  .ms-fact-label { font-family: var(--mono); font-size: 10px; color: var(--ink-mute); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
  .ms-fact-value { font-family: var(--display); font-size: 18px; color: var(--ink); font-weight: 700; letter-spacing: -0.015em; line-height: 1.2; }
  .ms-fact.amount .ms-fact-value { color: var(--gold-deep); font-size: 24px; }

  .ms-pdf-placeholder { padding: 56px 32px; text-align: center; background: var(--paper-cool); }
  .ms-pdf-placeholder-icon { display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 50%; background: white; border: 1px solid var(--line); margin-bottom: 14px; color: var(--ink-mute); }
  .ms-pdf-placeholder strong { display: block; font-family: var(--display); color: var(--ink); margin-bottom: 6px; font-weight: 700; }
  .ms-pdf-placeholder small { font-family: var(--mono); font-size: 11px; color: var(--ink-mute); display: block; margin-bottom: 18px; letter-spacing: 0.02em; }
  .ms-pdf-action { display: inline-flex; align-items: center; gap: 6px; background: white; color: var(--ink); border: 1px solid var(--line); padding: 9px 14px; border-radius: 8px; font-family: var(--display); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; letter-spacing: -0.005em; }
  .ms-pdf-action:hover { background: var(--ink); color: white; border-color: var(--ink); }

  .ms-material-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
  .ms-material { display: flex; gap: 12px; padding: 14px; background: var(--paper-warm); border: 1px solid var(--line-soft); border-radius: 10px; cursor: pointer; transition: all 0.15s; }
  .ms-material:hover { border-color: var(--ink); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.06); background: white; }
  .ms-material-thumb { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: white; font-family: var(--mono); font-weight: 700; font-size: 13px; letter-spacing: 0.02em; }
  .ms-material-thumb.kind-pdf { background: linear-gradient(135deg, #dc2626, #b91c1c); }
  .ms-material-thumb.kind-image { background: linear-gradient(135deg, #2563eb, #1e40af); }
  .ms-material-thumb.kind-video { background: linear-gradient(135deg, #7c3aed, #6d28d9); }
  .ms-material-thumb.kind-audio { background: linear-gradient(135deg, var(--gold-deep), #c97a14); }
  .ms-material-info { flex: 1; min-width: 0; }
  .ms-material-info strong { display: block; font-family: var(--display); font-size: 13px; color: var(--ink); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.005em; }
  .ms-material-info small { display: block; font-family: var(--mono); font-size: 10px; color: var(--ink-mute); margin-top: 2px; letter-spacing: 0.02em; }

  .ms-video-card { display: grid; grid-template-columns: 80px 1fr; gap: 16px; padding: 18px 22px; background: linear-gradient(135deg, #1e293b, #334155); color: white; border-radius: 12px; margin-bottom: 12px; }
  .ms-video-card.is-audio { background: linear-gradient(135deg, var(--gold-deep), #c97a14); }
  .ms-video-card:last-child { margin-bottom: 0; }
  .ms-video-thumb { width: 80px; height: 80px; border-radius: 10px; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .ms-video-thumb:hover { background: rgba(255,255,255,0.2); }
  .ms-video-info { min-width: 0; }
  .ms-video-info strong { display: block; font-family: var(--display); font-size: 15px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.005em; }
  .ms-video-info p { font-family: var(--display); font-size: 13px; opacity: 0.85; margin: 0 0 8px; line-height: 1.5; }
  .ms-video-meta { font-family: var(--mono); font-size: 10px; opacity: 0.6; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; }

  .ms-versions-list { display: flex; flex-direction: column; gap: 8px; }
  .ms-version-row { display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center; padding: 12px 16px; background: var(--paper-warm); border-radius: 10px; }
  .ms-version-row.current { background: linear-gradient(135deg, #fffbf2, #fef3c7); border: 1px solid #fde68a; }
  .ms-version-pill-mini { font-family: var(--mono); font-size: 11px; color: var(--ink-mid); background: white; border: 1px solid var(--line-soft); padding: 3px 8px; border-radius: 100px; letter-spacing: 0.04em; font-weight: 700; }
  .ms-version-row.current .ms-version-pill-mini { background: var(--gold); color: var(--black); border-color: var(--gold-deep); }
  .ms-version-info strong { display: block; font-family: var(--display); font-size: 13px; color: var(--ink); font-weight: 600; }
  .ms-version-info small { display: block; font-family: var(--mono); font-size: 10px; color: var(--ink-mute); margin-top: 2px; letter-spacing: 0.02em; }

  /* CTA */
  .ms-cta-card { background: linear-gradient(135deg, var(--ink), #1e293b); color: white; border-radius: 14px; padding: 36px 32px; margin-top: 16px; text-align: center; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .ms-cta-card h2 { margin: 0 0 12px; font-family: var(--display); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .ms-cta-card p { font-family: var(--display); font-size: 14px; opacity: 0.9; line-height: 1.55; max-width: 480px; margin: 0 auto 20px; }
  .ms-cta-buttons { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .ms-cta-primary { background: var(--gold); color: var(--black); border: none; padding: 12px 22px; border-radius: 10px; font-family: var(--display); font-size: 14px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.15s; letter-spacing: -0.005em; }
  .ms-cta-primary:hover { background: var(--gold-deep); transform: translateY(-1px); }
  .ms-cta-secondary { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 12px 18px; border-radius: 10px; font-family: var(--display); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .ms-cta-secondary:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }

  /* Closed Banner */
  .ms-closed-banner { padding: 28px 32px; border-radius: 14px; margin-top: 16px; text-align: center; box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
  .ms-closed-banner.is-won { background: var(--green-soft); border: 1px solid var(--green); }
  .ms-closed-banner.is-lost { background: var(--red-soft); border: 1px solid var(--red); }
  .ms-closed-banner-title { font-family: var(--display); font-size: 18px; font-weight: 700; color: var(--ink); margin-bottom: 6px; letter-spacing: -0.01em; }
  .ms-closed-banner-detail { font-family: var(--display); font-size: 14px; color: var(--ink-mid); }

  /* Frage-Box */
  .ms-question-box { display: flex; flex-direction: column; gap: 12px; }
  .ms-question-box textarea { width: 100%; border: 1.5px solid var(--line); background: white; padding: 12px 16px; border-radius: 10px; font-family: var(--display); font-size: 14px; color: var(--ink); resize: vertical; min-height: 100px; line-height: 1.5; }
  .ms-question-box textarea:focus { outline: none; border-color: var(--gold-deep); }
  .ms-question-actions { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .ms-question-info { font-family: var(--mono); font-size: 10px; color: var(--ink-mute); letter-spacing: 0.04em; }
  .ms-question-submit { background: var(--ink); color: white; border: none; padding: 9px 16px; border-radius: 8px; font-family: var(--display); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .ms-question-submit:hover { background: var(--gold-deep); }

  /* Forward */
  .ms-forward-card { background: white; border: 1px dashed var(--line); border-radius: 14px; padding: 20px 24px; margin-bottom: 16px; text-align: center; }
  .ms-forward-card strong { display: block; font-family: var(--display); font-size: 14px; color: var(--ink); font-weight: 700; margin-bottom: 6px; }
  .ms-forward-card small { display: block; font-family: var(--mono); font-size: 11px; color: var(--ink-mute); letter-spacing: 0.02em; margin-bottom: 14px; }
  .ms-forward-action { display: inline-flex; align-items: center; gap: 6px; background: white; border: 1px solid var(--line); padding: 9px 14px; border-radius: 8px; font-family: var(--display); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; color: var(--ink); }
  .ms-forward-action:hover { background: var(--ink); color: white; border-color: var(--ink); }

  /* Footer */
  .ms-footer { padding: 24px 22px; text-align: center; font-family: var(--mono); font-size: 10px; color: var(--ink-faint); letter-spacing: 0.06em; margin-top: 24px; }
  .ms-footer span { color: var(--ink-mute); }

  /* Modal */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal-backdrop.open { display: flex; }
  .modal-card { background: white; border-radius: 14px; max-width: 480px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.2); overflow: hidden; }
  .modal-header { padding: 24px 28px 12px; }
  .modal-header h3 { font-family: var(--display); font-size: 18px; font-weight: 700; color: var(--ink); letter-spacing: -0.015em; margin-bottom: 4px; }
  .modal-header p { font-family: var(--display); font-size: 13px; color: var(--ink-mid); line-height: 1.5; }
  .modal-body { padding: 0 28px 20px; }
  .modal-body input, .modal-body textarea { width: 100%; padding: 9px 12px; border: 1px solid var(--line); border-radius: 7px; font-family: var(--display); font-size: 13px; color: var(--ink); margin-bottom: 12px; }
  .modal-body input:focus, .modal-body textarea:focus { outline: none; border-color: var(--ink); }
  .modal-body label { display: block; font-family: var(--mono); font-size: 10px; color: var(--ink-mute); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
  .modal-footer { padding: 16px 28px 24px; display: flex; justify-content: flex-end; gap: 10px; border-top: 1px solid var(--line-soft); background: var(--paper-warm); }
  .btn-secondary { background: white; border: 1px solid var(--line); color: var(--ink-mid); padding: 9px 16px; border-radius: 8px; font-family: var(--display); font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--ink); color: white; border: none; padding: 9px 16px; border-radius: 8px; font-family: var(--display); font-size: 13px; font-weight: 700; cursor: pointer; }
  .btn-primary:hover { background: var(--gold-deep); }

  /* Example-Buttons in Modals */
  .example-buttons { display: flex; flex-direction: column; gap: 8px; }
  .example-btn { background: white; border: 1.5px solid var(--line); padding: 12px 16px; border-radius: 10px; font-family: var(--display); font-size: 13px; color: var(--ink); text-align: left; cursor: pointer; transition: all 0.15s; line-height: 1.4; }
  .example-btn:hover { border-color: var(--gold-deep); background: #fffbf2; transform: translateY(-1px); }
  .example-btn strong { display: block; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
  .example-btn small { display: block; font-family: var(--mono); font-size: 10px; color: var(--ink-mute); letter-spacing: 0.04em; }
  .example-btn-no-reason { background: var(--paper-cool); border-style: dashed; }

  /* Quick-Question Beispiel-Chips im Hauptbereich */
  .ms-question-examples { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .ms-question-chip { background: var(--paper-cool); border: 1px solid var(--line-soft); padding: 7px 12px; border-radius: 100px; font-family: var(--display); font-size: 12px; color: var(--ink-mid); cursor: pointer; transition: all 0.15s; font-weight: 500; }
  .ms-question-chip:hover { background: var(--gold); color: var(--black); border-color: var(--gold-deep); }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--ink); color: white; padding: 12px 20px; border-radius: 8px; font-family: var(--display); font-size: 13px; font-weight: 600; z-index: 2000; box-shadow: 0 8px 24px rgba(0,0,0,0.2); opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .toast.is-success { background: var(--green); }
  .toast.is-error { background: var(--red); }

  /* Empty State */
  .ms-empty { max-width: 480px; margin: 80px auto; padding: 40px 32px; background: white; border-radius: 14px; text-align: center; }
  .ms-empty h2 { font-family: var(--display); font-size: 20px; color: var(--ink); margin-bottom: 8px; font-weight: 700; }
  .ms-empty p { font-family: var(--display); font-size: 14px; color: var(--ink-mid); line-height: 1.5; }
  .ms-empty code { font-family: var(--mono); background: var(--paper-cool); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
</style>
</head>
<body>

<div id="microsite-root"></div>

<!-- Frage-Modal: Beispiel-Fragen als Buttons -->
<div class="modal-backdrop" id="question-modal">
  <div class="modal-card">
    <div class="modal-header">
      <h3>Frage stellen</h3>
      <p>Wählen Sie eine Beispiel-Frage — sie wird sofort an den Anbieter gesendet.</p>
    </div>
    <div class="modal-body">
      <div class="example-buttons" id="question-examples"></div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn-secondary" onclick="closeModal('question-modal')">Abbrechen</button>
    </div>
  </div>
</div>

<!-- Forward-Modal: Demo-Personen-Auswahl -->
<div class="modal-backdrop" id="forward-modal">
  <div class="modal-card">
    <div class="modal-header">
      <h3>An Kollegen weiterleiten</h3>
      <p>Wählen Sie eine Beispiel-Person aus — sie bekommt einen eigenen Link zur Microsite.</p>
    </div>
    <div class="modal-body">
      <div class="example-buttons" id="forward-examples"></div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn-secondary" onclick="closeModal('forward-modal')">Abbrechen</button>
    </div>
  </div>
</div>

<!-- Decline-Modal: Begründung als Beispiel-Buttons -->
<div class="modal-backdrop" id="decline-modal">
  <div class="modal-card">
    <div class="modal-header">
      <h3>Angebot ablehnen</h3>
      <p>Möchten Sie eine Begründung mitgeben? Wählen Sie einen Grund aus.</p>
    </div>
    <div class="modal-body">
      <div class="example-buttons" id="decline-examples"></div>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn-secondary" onclick="closeModal('decline-modal')">Abbrechen</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // ============ HELPERS ============

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function loadJSON(key, fallback) {
    try {
      var raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    } catch (e) { return fallback; }
  }

  function saveJSON(key, obj) {
    try { localStorage.setItem(key, JSON.stringify(obj)); } catch (e) {}
  }

  function formatCurrency(n) {
    return new Intl.NumberFormat('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n || 0);
  }

  function getInitials(name) {
    if (!name) return '??';
    var parts = name.trim().split(/\s+/);
    if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
    return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
  }

  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (type ? ' is-' + type : '');
    setTimeout(function() { t.classList.remove('show'); }, 3000);
  }

  function genId(prefix) {
    return (prefix || 'id') + '_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  }

  function openModal(id) {
    document.getElementById(id).classList.add('open');
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('open');
  }
  window.closeModal = closeModal;

  // ============ STATE ============

  var dealId = null;
  var recipientId = null;
  var deal = null;
  var recipient = null;

  // ============ LOAD DATA ============

  function init() {
    // URL-Params: ?d=DEAL_ID&r=RECIPIENT_ID
    var params = new URLSearchParams(window.location.search);
    dealId = params.get('d');
    recipientId = params.get('r');

    if (!dealId) {
      renderEmpty('Kein Vorgang angegeben.');
      return;
    }

    var deals = loadJSON('df_deals', []);
    deal = deals.find(function(d) { return d.id === dealId; });
    if (!deal) {
      renderEmpty('Vorgang nicht gefunden.');
      return;
    }

    // Empfänger bestimmen
    if (recipientId) {
      recipient = (deal.recipients || []).find(function(r) { return r.id === recipientId; });
    }
    if (!recipient) {
      // Hauptempfänger als Default
      recipient = (deal.recipients || []).find(function(r) { return r.role === 'primary'; }) || (deal.recipients || [])[0];
    }
    if (!recipient) {
      renderEmpty('Kein Empfänger für diesen Vorgang gefunden.');
      return;
    }

    // Tracking: Microsite-Öffnung
    trackActivity('microsite.opened', 'Microsite geöffnet', recipient.name + ' hat die Microsite aufgerufen');

    render();
  }

  function renderEmpty(msg) {
    document.getElementById('microsite-root').innerHTML =
      '<div class="ms-shell"><div class="ms-empty">' +
        '<h2>' + escapeHtml(msg) + '</h2>' +
        '<p>Bitte verwenden Sie den Link aus Ihrer E-Mail. Die URL muss einen Parameter <code>?d=...</code> enthalten.</p>' +
      '</div></div>';
  }

  // ============ TRACKING ============

  function trackActivity(type, label, detail, extra) {
    if (!deal || !recipient) return;
    var deals = loadJSON('df_deals', []);
    var freshDeal = deals.find(function(d) { return d.id === deal.id; });
    if (!freshDeal) return;
    var freshRecipient = (freshDeal.recipients || []).find(function(r) { return r.id === recipient.id; });
    if (!freshRecipient) return;

    if (!freshRecipient.activities) freshRecipient.activities = [];
    var activity = {
      id: genId('act'),
      type: type,
      label: label,
      detail: detail || '',
      simulatedAt: Date.now(),
      userTriggered: true
    };
    if (extra) {
      Object.keys(extra).forEach(function(k) { activity[k] = extra[k]; });
    }
    freshRecipient.activities.push(activity);

    // Status-Update bei deal.won/lost
    if (type === 'deal.won') {
      freshDeal.status = 'won';
      freshDeal.closedAt = Date.now();
      if (extra && extra.closeNote) freshDeal.closeNote = extra.closeNote;
    } else if (type === 'deal.lost') {
      freshDeal.status = 'lost';
      freshDeal.closedAt = Date.now();
      if (extra && extra.closeNote) freshDeal.closeNote = extra.closeNote;
    } else if (type === 'microsite.opened') {
      // Status auf 'opened' setzen wenn vorher 'sent'
      if (freshDeal.status === 'sent') freshDeal.status = 'opened';
    }

    saveJSON('df_deals', deals);

    // Lokales State updaten
    deal = freshDeal;
    recipient = freshRecipient;
  }

  // ============ ACTIONS ============

  window.acceptDeal = function() {
    if (deal.status === 'won' || deal.status === 'lost') return;
    if (!confirm('Möchten Sie das Angebot verbindlich annehmen?')) return;
    trackActivity('deal.won', 'Angebot angenommen', recipient.name + ' hat das Angebot verbindlich angenommen', { closeNote: '' });
    showToast('Vielen Dank — der Anbieter wird informiert.', 'success');
    setTimeout(render, 600);
  };

  // ============ DEMO-BEISPIELE ============

  var EXAMPLE_QUESTIONS = [
    { title: 'Liefertermin verbindlich?', desc: 'Können Sie den genannten Liefertermin auch garantieren?' },
    { title: 'Skonto bei Sofortzahlung?', desc: 'Gibt es einen Rabatt bei Zahlung innerhalb 7 Tagen?' },
    { title: 'Zusatzleistungen möglich?', desc: 'Welche Zusatzleistungen können wir noch ergänzen?' },
    { title: 'Wartung inklusive?', desc: 'Ist eine Wartung im Angebotspreis enthalten?' },
    { title: 'Referenzkunden nennen?', desc: 'Können Sie mir 2-3 Referenzkunden nennen?' }
  ];

  var EXAMPLE_FORWARDS = [
    { name: 'Klaus Müller', email: 'klaus.mueller@beispiel-firma.de', position: 'Geschäftsführung', comment: 'Bitte schau dir das mal an, ich finde das Angebot interessant.' },
    { name: 'Sandra Klein', email: 'sandra.klein@beispiel-firma.de', position: 'Einkauf', comment: 'Können Sie das mit unserem Budget abgleichen?' },
    { name: 'Dr. Markus Berg', email: 'm.berg@beispiel-firma.de', position: 'Technische Leitung', comment: 'Bitte technische Spezifikationen prüfen.' }
  ];

  var EXAMPLE_DECLINE_REASONS = [
    { title: 'Preis liegt über Budget', desc: 'Der Angebotspreis übersteigt unser geplantes Budget' },
    { title: 'Anderer Anbieter gewählt', desc: 'Wir haben uns für einen anderen Anbieter entschieden' },
    { title: 'Projekt verschoben', desc: 'Das Projekt wird ins nächste Jahr verschoben' },
    { title: 'Anforderungen geändert', desc: 'Unsere Anforderungen haben sich geändert' },
    { title: 'Ohne Begründung ablehnen', desc: '', noReason: true }
  ];

  // ============ ACTIONS ============

  window.openDeclineModal = function() {
    if (deal.status === 'won' || deal.status === 'lost') return;
    var listEl = document.getElementById('decline-examples');
    listEl.innerHTML = EXAMPLE_DECLINE_REASONS.map(function(r, i) {
      return '<button type="button" class="example-btn' + (r.noReason ? ' example-btn-no-reason' : '') + '" data-decline-idx="' + i + '">' +
        '<strong>' + escapeHtml(r.title) + '</strong>' +
        (r.desc ? '<small>' + escapeHtml(r.desc) + '</small>' : '') +
      '</button>';
    }).join('');
    listEl.querySelectorAll('[data-decline-idx]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var idx = parseInt(btn.dataset.declineIdx, 10);
        var reason = EXAMPLE_DECLINE_REASONS[idx];
        var note = reason.noReason ? '' : reason.desc;
        trackActivity('deal.lost', 'Angebot abgelehnt', note || (recipient.name + ' hat das Angebot abgelehnt'), { closeNote: note });
        closeModal('decline-modal');
        showToast('Der Anbieter wurde benachrichtigt.', 'success');
        setTimeout(render, 600);
      });
    });
    openModal('decline-modal');
  };

  window.openQuestionModal = function() {
    var listEl = document.getElementById('question-examples');
    listEl.innerHTML = EXAMPLE_QUESTIONS.map(function(q, i) {
      return '<button type="button" class="example-btn" data-q-idx="' + i + '">' +
        '<strong>' + escapeHtml(q.title) + '</strong>' +
        '<small>' + escapeHtml(q.desc) + '</small>' +
      '</button>';
    }).join('');
    listEl.querySelectorAll('[data-q-idx]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var idx = parseInt(btn.dataset.qIdx, 10);
        var q = EXAMPLE_QUESTIONS[idx];
        trackActivity('question.asked', 'Frage gestellt', q.desc);
        closeModal('question-modal');
        showToast('Frage gesendet — der Anbieter wurde informiert.', 'success');
      });
    });
    openModal('question-modal');
  };

  window.openForwardModal = function() {
    // Filtere bereits weitergeleitete Personen aus
    var existingEmails = (deal.recipients || []).map(function(r) { return (r.email || '').toLowerCase(); });
    var available = EXAMPLE_FORWARDS.filter(function(f) {
      return existingEmails.indexOf(f.email.toLowerCase()) < 0;
    });
    var listEl = document.getElementById('forward-examples');
    if (available.length === 0) {
      listEl.innerHTML = '<div style="padding: 16px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--ink-mute);">Alle Beispiel-Kontakte wurden bereits weitergeleitet.</div>';
    } else {
      listEl.innerHTML = available.map(function(f, i) {
        return '<button type="button" class="example-btn" data-fw-name="' + escapeHtml(f.name) + '" data-fw-email="' + escapeHtml(f.email) + '" data-fw-position="' + escapeHtml(f.position) + '" data-fw-comment="' + escapeHtml(f.comment) + '">' +
          '<strong>' + escapeHtml(f.name) + ' · ' + escapeHtml(f.position) + '</strong>' +
          '<small>' + escapeHtml(f.email) + '</small>' +
          '<small style="font-style: italic; margin-top: 4px;">„' + escapeHtml(f.comment) + '"</small>' +
        '</button>';
      }).join('');
      listEl.querySelectorAll('[data-fw-name]').forEach(function(btn) {
        btn.addEventListener('click', function() {
          submitForwardWithData({
            name: btn.dataset.fwName,
            email: btn.dataset.fwEmail,
            position: btn.dataset.fwPosition,
            comment: btn.dataset.fwComment
          });
        });
      });
    }
    openModal('forward-modal');
  };

  function submitForwardWithData(data) {
    var deals = loadJSON('df_deals', []);
    var freshDeal = deals.find(function(d) { return d.id === deal.id; });
    if (!freshDeal) return;

    var newRecipient = {
      id: genId('rcp'),
      name: data.name,
      email: data.email,
      company: recipient.company || '',
      position: data.position,
      role: 'secondary',
      addedAt: Date.now(),
      forwardedBy: recipient.id,
      forwardComment: data.comment,
      activities: [{
        id: genId('act'),
        type: 'forward.received',
        label: 'Per Weiterleitung erhalten',
        detail: 'Weitergeleitet von ' + recipient.name + (data.comment ? ' mit Notiz: „' + data.comment + '"' : ''),
        simulatedAt: Date.now(),
        userTriggered: true
      }]
    };
    if (!freshDeal.recipients) freshDeal.recipients = [];
    freshDeal.recipients.push(newRecipient);
    saveJSON('df_deals', deals);

    trackActivity('forward.initiated', 'An ' + data.name + ' weitergeleitet', data.comment || ('Weiterleitung an ' + data.name + ' (' + data.email + ')'));

    closeModal('forward-modal');
    showToast('An ' + data.name + ' weitergeleitet.', 'success');
  }


  // ============ RENDER ============

  function render() {
    var company = loadJSON('df_company', {});
    var brand = loadJSON('df_brand', {});
    var team = loadJSON('df_team', { members: [] });

    // Brand
    var brandFull = company['c-company'] || 'Ihr Unternehmen';
    var brandShort = brandFull.slice(0, 3).toUpperCase();

    // Lead
    var leadUser = (team.members || []).find(function(m) { return m.id === (deal.leadUserId || 'me'); });
    if (!leadUser) leadUser = (team.members || [])[0] || { name: 'Ihr Vertrieb', email: '' };
    var leadName = leadUser.name || 'Ihr Vertrieb';
    var firstLeadName = leadName.split(' ')[0];
    var leadInitials = getInitials(leadName);

    // Recipient
    var firstName = recipient.name.split(' ')[0] || recipient.name;

    // Version
    var versionsCount = (deal.pdfVersions || []).length;
    var currentVersion = versionsCount + 1;

    var html = '<div class="ms-shell"><div class="ms-container">';

    // Top-Bar
    html += '<div class="ms-topbar">' +
      '<div class="ms-brand">' +
        '<div class="ms-brand-logo">' + escapeHtml(brandShort) + '</div>' +
        '<div class="ms-brand-text">' +
          '<strong>' + escapeHtml(brandFull) + '</strong>' +
          '<small>Persönlich für ' + escapeHtml(recipient.name) + '</small>' +
        '</div>' +
      '</div>' +
      '<div class="ms-version-pill">' +
        '<strong>v' + currentVersion + '</strong>' + (versionsCount > 0 ? ' von ' + currentVersion : ' aktuell') +
      '</div>' +
    '</div>';

    // Hero
    html += '<div class="ms-hero">' +
      '<div class="ms-hero-greeting">Vorgang ' + escapeHtml(deal.dealNumber || '–') + '</div>' +
      '<h1>Hallo ' + escapeHtml(firstName) + ', hier ist <span class="gold">Ihr Angebot</span> von ' + escapeHtml(firstLeadName) + '.</h1>' +
      (deal.description ? '<div class="ms-hero-letter">' + escapeHtml(deal.description) + '</div>' : '') +
      '<div class="ms-hero-signature">' +
        '<div class="ms-sig-avatar">' + escapeHtml(leadInitials) + '</div>' +
        '<div class="ms-sig-info">' +
          '<strong>' + escapeHtml(leadName) + '</strong>' +
          '<small>' + escapeHtml(leadUser.email || '') + (brandFull ? ' · ' + escapeHtml(brandFull) : '') + '</small>' +
        '</div>' +
      '</div>' +
    '</div>';

    // Eckdaten
    var facts = [];
    if (deal.value) facts.push({ label: 'Gesamtsumme netto', value: formatCurrency(deal.value) + ' €', amount: true });
    if (deal.delivery) facts.push({ label: 'Lieferzeit / Leistungszeitraum', value: deal.delivery });
    if (deal.payment) facts.push({ label: 'Zahlungskonditionen', value: deal.payment });
    if (deal.validUntil) {
      var dt = new Date(deal.validUntil);
      var dateStr = isNaN(dt.getTime()) ? deal.validUntil : dt.toLocaleDateString('de-DE');
      facts.push({ label: 'Gültig bis', value: dateStr });
    }
    if (facts.length > 0) {
      html += '<div class="ms-card">' +
        '<div class="ms-card-header"><h3>Eckdaten auf einen Blick</h3><small>Vorgang ' + escapeHtml(deal.dealNumber || '–') + ' · v' + currentVersion + '</small></div>' +
        '<div class="ms-facts-grid">' +
          facts.map(function(f) {
            return '<div class="ms-fact' + (f.amount ? ' amount' : '') + '">' +
              '<div class="ms-fact-label">' + escapeHtml(f.label) + '</div>' +
              '<div class="ms-fact-value">' + escapeHtml(f.value) + '</div>' +
            '</div>';
          }).join('') +
        '</div>' +
      '</div>';
    }

    // PDF
    if (deal.pdfFile) {
      html += '<div class="ms-card">' +
        '<div class="ms-card-header"><h3>Vollständiges Angebot (PDF)</h3><small>' + escapeHtml(deal.pdfFile.name) + '</small></div>' +
        '<div class="ms-pdf-placeholder">' +
          '<div class="ms-pdf-placeholder-icon">' +
            '<svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14,2 14,8 20,8"/></svg>' +
          '</div>' +
          '<strong>' + escapeHtml(deal.pdfFile.name) + '</strong>' +
          '<small>' + escapeHtml(deal.pdfFile.size || '') + ' · Demo: PDF wird hier eingebettet</small>' +
          '<button type="button" class="ms-pdf-action" onclick="trackPdfDownload()">' +
            '<svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>' +
            'PDF herunterladen' +
          '</button>' +
        '</div>' +
      '</div>';
    }

    // Video/Audio
    var videos = deal.videoFiles || [];
    if (videos.length > 0) {
      html += '<div class="ms-card">' +
        '<div class="ms-card-header"><h3>Persönliche Botschaft' + (videos.length > 1 ? 'en' : '') + ' von ' + escapeHtml(firstLeadName) + '</h3><small>' + videos.length + ' Aufnahme' + (videos.length > 1 ? 'n' : '') + '</small></div>' +
        '<div class="ms-card-body">';
      videos.forEach(function(v, i) {
        var isAudio = v.kind === 'audio';
        var iconSvg = isAudio
          ? '<svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>'
          : '<svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>';
        var typeText = isAudio ? 'Audio' : 'Video';
        html += '<div class="ms-video-card' + (isAudio ? ' is-audio' : '') + '">' +
          '<div class="ms-video-thumb" onclick="trackMediaPlay(\'' + escapeHtml(v.name) + '\')">' + iconSvg + '</div>' +
          '<div class="ms-video-info">' +
            '<strong>' + typeText + ' ' + (i+1) + (videos.length === 1 ? ' · Persönliche Botschaft' : '') + '</strong>' +
            '<p>' + escapeHtml(v.name) + '</p>' +
            '<span class="ms-video-meta">' + (isAudio ? 'AUDIO' : 'VIDEO') + ' · ' + escapeHtml(v.size || '') + ' · v' + currentVersion + '</span>' +
          '</div>' +
        '</div>';
      });
      html += '</div></div>';
    }

    // Material-Ordner
    (deal.folders || []).forEach(function(folder) {
      var files = folder.files || [];
      if (files.length === 0) return;
      var folderName = folder.name || 'Weitere Unterlagen';
      html += '<div class="ms-card">' +
        '<div class="ms-card-header"><h3>' + escapeHtml(folderName) + '</h3><small>' + files.length + ' Datei' + (files.length === 1 ? '' : 'en') + '</small></div>' +
        '<div class="ms-card-body">' +
          '<div class="ms-material-grid">' +
            files.map(function(f) {
              var label = f.kind === 'pdf' ? 'PDF' : (f.kind === 'image' ? 'IMG' : (f.kind === 'audio' ? 'AUD' : 'VID'));
              var typeLabel = f.kind === 'pdf' ? 'Datenblatt' : (f.kind === 'image' ? 'Bild' : (f.kind === 'audio' ? 'Audio' : 'Video'));
              return '<div class="ms-material" onclick="trackFileOpen(\'' + escapeHtml(f.name) + '\')">' +
                '<div class="ms-material-thumb kind-' + escapeHtml(f.kind || 'pdf') + '">' + label + '</div>' +
                '<div class="ms-material-info"><strong>' + escapeHtml(f.name) + '</strong><small>' + typeLabel + (f.size ? ' · ' + escapeHtml(f.size) : '') + '</small></div>' +
              '</div>';
            }).join('') +
          '</div>' +
        '</div>' +
      '</div>';
    });

    // Versionen
    if (versionsCount > 0) {
      var allVersions = [];
      allVersions.push({
        v: currentVersion,
        date: 'Aktuell',
        changeNote: deal.title || 'Aktuelle Version',
        filename: deal.pdfFile ? deal.pdfFile.name : '',
        amount: deal.value ? formatCurrency(deal.value) + ' €' : '—',
        current: true
      });
      (deal.pdfVersions || []).forEach(function(pv) {
        allVersions.push({
          v: pv.version,
          date: new Date(pv.replacedAt).toLocaleDateString('de-DE'),
          changeNote: 'Frühere Version',
          filename: pv.name,
          amount: '—',
          current: false
        });
      });
      html += '<div class="ms-card">' +
        '<div class="ms-card-header"><h3>Versionen</h3><small>' + allVersions.length + ' Stand' + (allVersions.length === 1 ? '' : 'e') + '</small></div>' +
        '<div class="ms-card-body">' +
          '<div class="ms-versions-list">' +
            allVersions.map(function(v) {
              return '<div class="ms-version-row' + (v.current ? ' current' : '') + '">' +
                '<div class="ms-version-pill-mini">v' + v.v + '</div>' +
                '<div class="ms-version-info"><strong>' + escapeHtml(v.changeNote) + '</strong><small>' + escapeHtml(v.date) + (v.filename ? ' · ' + escapeHtml(v.filename) : '') + '</small></div>' +
                '<div style="font-family: var(--display); font-size: 13px; font-weight: 700; color: var(--ink);">' + escapeHtml(v.amount) + '</div>' +
              '</div>';
            }).join('') +
          '</div>' +
        '</div>' +
      '</div>';
    }

    // CTA / Closed-Banner
    var alreadyClosed = (deal.status === 'won' || deal.status === 'lost');
    if (alreadyClosed) {
      var bannerCls = deal.status === 'won' ? 'is-won' : 'is-lost';
      var bannerLabel = deal.status === 'won' ? '🏆 Sie haben das Angebot angenommen' : '✗ Das Angebot wurde abgelehnt';
      html += '<div class="ms-closed-banner ' + bannerCls + '">' +
        '<div class="ms-closed-banner-title">' + bannerLabel + '</div>' +
        '<div class="ms-closed-banner-detail">Vielen Dank — ' + escapeHtml(firstLeadName) + ' meldet sich in Kürze bei Ihnen.</div>' +
      '</div>';
    } else {
      html += '<div class="ms-cta-card">' +
        '<h2>' + escapeHtml(deal.title || 'Ihr Angebot') + '</h2>' +
        '<p>Wenn alles passt, können Sie das Angebot direkt verbindlich annehmen.<br>Bei Fragen einfach unten antworten — ' + escapeHtml(firstLeadName) + ' ist persönlich erreichbar.</p>' +
        '<div class="ms-cta-buttons">' +
          '<button type="button" class="ms-cta-primary" onclick="acceptDeal()">' +
            '<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>' +
            'Angebot verbindlich annehmen' +
          '</button>' +
          '<button type="button" class="ms-cta-secondary" onclick="openDeclineModal()">Angebot ablehnen</button>' +
        '</div>' +
      '</div>';
    }

    // Frage-Card
    if (!alreadyClosed) {
      html += '<div class="ms-card">' +
        '<div class="ms-card-header"><h3>Frage stellen oder Anmerkung hinterlassen</h3><small>' + escapeHtml(firstLeadName) + ' antwortet i.d.R. innerhalb von 2h</small></div>' +
        '<div class="ms-card-body">' +
          '<div style="font-family: var(--display); font-size: 13px; color: var(--ink-mid); margin-bottom: 12px; line-height: 1.5;">Wählen Sie eine Beispiel-Frage oder klicken Sie auf <strong>„Eigene Frage stellen"</strong>:</div>' +
          '<div class="ms-question-examples">' +
            EXAMPLE_QUESTIONS.slice(0, 3).map(function(q, i) {
              return '<button type="button" class="ms-question-chip" data-quick-q-idx="' + i + '">' + escapeHtml(q.title) + '</button>';
            }).join('') +
            '<button type="button" class="ms-question-chip" onclick="openQuestionModal()" style="background: var(--ink); color: white; border-color: var(--ink);">+ Weitere Fragen</button>' +
          '</div>' +
          '<div style="font-family: var(--mono); font-size: 10px; color: var(--ink-mute); margin-top: 12px; letter-spacing: 0.04em;">Sichtbar für ' + escapeHtml(firstLeadName) + ' und ' + ((deal.recipients||[]).length || 1) + ' weitere Beteiligte</div>' +
        '</div>' +
      '</div>';
    }

    // Forward-Card
    if (!alreadyClosed) {
      html += '<div class="ms-forward-card">' +
        '<strong>An einen Kollegen weiterleiten</strong>' +
        '<small>Möchten Sie das Angebot in Ihrem Team teilen?</small>' +
        '<button type="button" class="ms-forward-action" onclick="openForwardModal()">' +
          '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,17 20,12 15,7"/><path d="M4 18v-2a4 4 0 0 1 4-4h12"/></svg>' +
          'Microsite weiterleiten' +
        '</button>' +
      '</div>';
    }

    // Footer
    html += '<div class="ms-footer">Persönlich erstellt von ' + escapeHtml(brandFull) + ' · <span>powered by Dealfalcon</span></div>';

    html += '</div></div>';

    document.getElementById('microsite-root').innerHTML = html;

    // Quick-Question-Chip Bindings
    document.querySelectorAll('[data-quick-q-idx]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var idx = parseInt(btn.dataset.quickQIdx, 10);
        var q = EXAMPLE_QUESTIONS[idx];
        if (!q) return;
        trackActivity('question.asked', 'Frage gestellt', q.desc);
        showToast('„' + q.title + '" gesendet — der Anbieter wurde informiert.', 'success');
      });
    });
  }

  // Quick Frage direkt im Hauptbereich (Bindings über data-quick-q-idx in render)

  window.trackPdfDownload = function() {
    trackActivity('file.downloaded', 'PDF heruntergeladen', 'Angebots-PDF wurde heruntergeladen', { file: deal.pdfFile ? deal.pdfFile.name : '' });
    showToast('PDF wird heruntergeladen … (Demo)', 'success');
  };

  window.trackFileOpen = function(filename) {
    trackActivity('file.opened', filename + ' geöffnet', 'Datei in der Microsite angeschaut', { file: filename });
    showToast(filename + ' wird geöffnet … (Demo)', 'success');
  };

  window.trackMediaPlay = function(name) {
    trackActivity('file.opened', name + ' abgespielt', 'Botschaft angeschaut', { file: name });
    showToast(name + ' wird abgespielt … (Demo)', 'success');
  };

  // Modal-Backdrop click to close
  document.querySelectorAll('.modal-backdrop').forEach(function(m) {
    m.addEventListener('click', function(e) {
      if (e.target === m) m.classList.remove('open');
    });
  });

  // Escape to close modals
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-backdrop.open').forEach(function(m) { m.classList.remove('open'); });
    }
  });

  init();
})();
</script>
</body>
</html>
