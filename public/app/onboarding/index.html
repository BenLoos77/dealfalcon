<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dealfalcon — Onboarding (in Vorbereitung)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter Tight', sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    color: #1d1d1f;
  }
  .stub-card {
    background: white;
    border-radius: 16px;
    padding: 56px 48px;
    max-width: 540px;
    text-align: center;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04), 0 12px 40px rgba(0,0,0,0.06);
    border: 1px solid #e8e8ed;
  }
  .stub-icon {
    width: 72px;
    height: 72px;
    background: linear-gradient(135deg, #fef9c3, #fbbf24);
    border-radius: 50%;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #c97a14;
  }
  h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 14px; line-height: 1.15; }
  p { font-size: 15px; color: #424245; line-height: 1.55; margin-bottom: 12px; max-width: 460px; margin-left: auto; margin-right: auto; }
  .account-info {
    background: #f5f5f7;
    border-radius: 10px;
    padding: 18px 22px;
    margin: 28px auto;
    text-align: left;
    max-width: 380px;
    border: 1px solid #e8e8ed;
  }
  .account-info-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 13px;
  }
  .account-info-row:not(:last-child) { border-bottom: 1px solid #e8e8ed; }
  .account-info-label {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: #6e6e73;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .account-info-value {
    font-family: 'Geist Mono', monospace;
    color: #1d1d1f;
    font-weight: 500;
  }
  .actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 24px;
  }
  .btn {
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 11px 22px;
    border-radius: 8px;
    text-decoration: none;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary { background: #0a0a0a; color: white; }
  .btn-primary:hover { background: #1d1d1f; transform: translateY(-1px); }
  .btn-secondary { background: white; border: 1.5px solid #d2d2d7; color: #424245; }
  .btn-secondary:hover { border-color: #0a0a0a; color: #0a0a0a; }
  .btn-danger { background: white; border: 1.5px solid #fecaca; color: #dc2626; }
  .btn-danger:hover { background: #fee2e2; border-color: #dc2626; }
  .footer-note {
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid #e8e8ed;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    color: #86868b;
    letter-spacing: 0.04em;
  }
  .footer-note a {
    color: #c97a14;
    text-decoration: none;
    font-weight: 600;
    cursor: pointer;
  }
  .footer-note a:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="stub-card">
  <div class="stub-icon">
    <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12,6 12,12 16,14"/>
    </svg>
  </div>

  <h1 id="welcome-title">Willkommen, <span id="firstname-display">…</span>!</h1>
  <p>Ihr Account wurde erfolgreich angelegt. Das geführte Onboarding (Firmendaten, Microsite-Erscheinung, Team, Dokumente) wird in der nächsten Etappe ergänzt.</p>

  <div class="account-info" id="account-box">
    <!-- via JS -->
  </div>

  <div class="actions">
    <a href="/demo/" class="btn btn-primary">
      Live-Demo ansehen
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>
    </a>
    <a href="/" class="btn btn-secondary">Zur Startseite</a>
  </div>

  <div class="footer-note">
    Demo-Modus · Daten werden lokal im Browser gespeichert
    <br><a onclick="resetAll()">Demo zurücksetzen &amp; Account löschen</a>
  </div>
</div>

<script>
  function loadAccount() {
    try { return JSON.parse(localStorage.getItem('df_account') || 'null'); }
    catch(e) { return null; }
  }

  const PLAN_NAMES = {
    solo: 'Solo (1 Benutzer)',
    team: 'Team (3 Benutzer)',
    business: 'Business (5 Benutzer)',
    pro: 'Pro (10 Benutzer)',
    enterprise: 'Enterprise (∞ Benutzer)'
  };

  document.addEventListener('DOMContentLoaded', () => {
    const a = loadAccount();
    if (!a) {
      // Wenn kein Account: zurück zum Signup
      document.getElementById('welcome-title').innerHTML = 'Kein Account gefunden';
      document.querySelector('p').textContent = 'Es scheint, dass noch kein Account angelegt wurde. Starten Sie jetzt mit der Anmeldung.';
      document.getElementById('account-box').style.display = 'none';
      document.querySelector('.actions').innerHTML = '<a href="/signup" class="btn btn-primary">Account anlegen</a><a href="/" class="btn btn-secondary">Zur Startseite</a>';
      return;
    }

    document.getElementById('firstname-display').textContent = a.firstname || a.email || 'da';

    const box = document.getElementById('account-box');
    box.innerHTML = `
      <div class="account-info-row">
        <span class="account-info-label">Unternehmen</span>
        <span class="account-info-value">${a.company || '—'}</span>
      </div>
      <div class="account-info-row">
        <span class="account-info-label">E-Mail</span>
        <span class="account-info-value">${a.email || '—'}</span>
      </div>
      <div class="account-info-row">
        <span class="account-info-label">Plan</span>
        <span class="account-info-value">${PLAN_NAMES[a.plan] || a.plan || '—'}</span>
      </div>
      <div class="account-info-row">
        <span class="account-info-label">Zahlmethode</span>
        <span class="account-info-value">${a.paymentMethod === 'paypal' ? 'PayPal' : 'Kreditkarte'}</span>
      </div>
    `;
  });

  function resetAll() {
    if (!confirm('Demo-Daten löschen und neu starten? Account, Onboarding und alle gespeicherten Werte werden entfernt.')) return;
    ['df_signup','df_account','df_onboarding','df_company','df_brand','df_team','df_documents'].forEach(k => localStorage.removeItem(k));
    window.location.href = '/';
  }
</script>

</body>
</html>
