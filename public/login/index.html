<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Anmelden — Dealfalcon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --ink: #0a0a0a;
      --ink-mid: #525252;
      --ink-mute: #888;
      --gold: #f5a524;
      --gold-deep: #c97a14;
      --paper: #f5f5f7;
      --paper-warm: #fafaf7;
      --line: #d1d1d6;
      --line-soft: #ebebef;
      --display: 'Inter Tight', system-ui, sans-serif;
      --mono: 'Geist Mono', ui-monospace, monospace;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--paper); font-family: var(--display); color: var(--ink); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { background: white; border: 1px solid var(--line-soft); border-radius: 18px; padding: 44px 40px; max-width: 440px; width: 100%; box-shadow: 0 8px 30px rgba(0,0,0,0.06); }
    .login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .login-logo-icon { width: 36px; height: 36px; border-radius: 9px; background: var(--ink); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; letter-spacing: -0.02em; }
    .login-logo-name { font-family: var(--display); font-size: 16px; font-weight: 600; color: var(--ink); }
    h1 { font-family: var(--display); font-size: 26px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; margin: 0 0 8px; }
    .login-subtitle { font-family: var(--display); font-size: 15px; color: var(--ink-mid); line-height: 1.5; margin: 0 0 28px; }
    label { display: block; font-family: var(--mono); font-size: 11px; color: var(--ink-mute); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 600; margin-bottom: 6px; }
    input[type="email"] { width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px; font-family: var(--display); font-size: 15px; color: var(--ink); background: white; transition: border-color 0.15s; }
    input[type="email"]:focus { outline: none; border-color: var(--ink); }
    .btn-primary { width: 100%; background: var(--ink); color: white; border: none; padding: 14px 20px; border-radius: 10px; font-family: var(--display); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 16px; transition: all 0.15s; letter-spacing: -0.005em; }
    .btn-primary:hover { background: #1a1a1a; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: wait; transform: none; }
    .login-success { background: #ecfdf5; border: 1px solid #10b981; color: #065f46; padding: 16px 18px; border-radius: 12px; font-family: var(--display); font-size: 14px; line-height: 1.5; margin-top: 16px; }
    .login-error { background: #fef2f2; border: 1px solid #ef4444; color: #991b1b; padding: 12px 16px; border-radius: 12px; font-family: var(--display); font-size: 13px; line-height: 1.5; margin-top: 16px; }
    .login-footer { font-family: var(--display); font-size: 12px; color: var(--ink-mute); text-align: center; margin-top: 24px; line-height: 1.6; }
    .login-footer a { color: var(--ink); text-decoration: underline; text-decoration-color: var(--line); text-underline-offset: 3px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">DF</div>
      <div class="login-logo-name">dealfalcon</div>
    </div>

    <h1>Anmelden</h1>
    <p class="login-subtitle">Geben Sie Ihre E-Mail-Adresse ein. Sie erhalten einen Login-Link, klicken drauf — und sind drin.</p>

    <form id="login-form">
      <label for="email">E-Mail-Adresse</label>
      <input type="email" id="email" required autocomplete="email" placeholder="ihre@firma.de">
      <button type="submit" class="btn-primary" id="btn-submit">Login-Link senden</button>
    </form>

    <div id="message"></div>

    <div class="login-footer">
      Noch kein Account? Tragen Sie einfach Ihre E-Mail oben ein — Ihr Workspace wird automatisch beim ersten Login erstellt.
    </div>
  </div>

  <script src="/api/config"></script>
  <script src="/lib/df-api.js"></script>
  <script>
    var form = document.getElementById('login-form');
    var emailInput = document.getElementById('email');
    var btn = document.getElementById('btn-submit');
    var msg = document.getElementById('message');

    // Falls Fehler-Code aus Magic-Link-Redirect ankommt
    var urlParams = new URLSearchParams(window.location.search);
    var errCode = urlParams.get('error');
    if (errCode) {
      var errText = 'Etwas ist schiefgelaufen. Bitte fordern Sie einen neuen Login-Link an.';
      if (errCode === 'otp_expired') errText = 'Der Login-Link ist abgelaufen oder wurde schon verwendet. Bitte fordern Sie einen neuen an.';
      else if (errCode === 'access_denied') errText = 'Der Login-Link ist ungültig. Bitte fordern Sie einen neuen an.';
      msg.innerHTML = '<div class="login-error">' + errText + '</div>';
    }

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      var email = emailInput.value.trim();
      if (!email || email.indexOf('@') < 1) {
        msg.innerHTML = '<div class="login-error">Bitte geben Sie eine gültige E-Mail-Adresse ein.</div>';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Wird versendet…';
      msg.innerHTML = '';
      var result = await DfApi.sendMagicLink(email, {
        redirectTo: location.origin + '/app/dashboard'
      });
      btn.disabled = false;
      btn.textContent = 'Login-Link senden';
      if (result.error) {
        msg.innerHTML = '<div class="login-error">' + escapeHtml(result.error) + '</div>';
      } else {
        msg.innerHTML = '<div class="login-success"><strong>E-Mail unterwegs!</strong><br>Wir haben Ihnen einen Login-Link an <strong>' + escapeHtml(email) + '</strong> geschickt. Öffnen Sie Ihr Postfach und klicken Sie auf den Link, um sich anzumelden.</div>';
        form.style.display = 'none';
      }
    });

    function escapeHtml(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
